<body>
<div class="bg-grid"></div>
<div class="container">
    <div class="header">
        <h1><img class="header-logo" src="avatars/logo.png" alt="adtechnacity logo" />Project AI Unlock 10x</h1>
        <div class="subtitle">Enablement Exercise Leaderboard</div>
    </div>
    <div class="tab-nav" id="tab-nav"></div>
    <div id="views-container"></div>
    <div class="footer">AI Unlock 10x — adtechnacity — Updated March 2026</div>
</div>
<script>
// ========== DATA LOADING & SCORING ENGINE ==========

let DATA = null;

async function loadData() {
    const resp = await fetch('data.json');
    DATA = await resp.json();
    validateData(DATA);
    renderApp(DATA);
}

// ========== VALIDATION ==========

function validateData(data) {
    const participantNames = new Set(data.participants.map(p => p.name));
    const warnings = [];

    // Check team members exist as participants
    for (const [teamName, team] of Object.entries(data.teams)) {
        for (const member of team.members) {
            if (!participantNames.has(member)) {
                warnings.push(`Team "${teamName}" member "${member}" not found in participants`);
            }
        }
    }

    // Check score totals
    for (const p of data.participants) {
        for (const [weekId, w] of Object.entries(p.weeks)) {
            const computed = computeWeekScore(w);
            if (computed !== w.total) {
                warnings.push(`${p.name} ${weekId}: computed total ${computed} != stored total ${w.total}`);
            }
        }
    }

    // Check required fields
    for (const p of data.participants) {
        if (!p.name) warnings.push('Participant missing name');
        for (const [weekId, w] of Object.entries(p.weeks)) {
            if (!w.status) warnings.push(`${p.name} ${weekId}: missing status`);
        }
    }

    if (warnings.length > 0) {
        console.warn('Data validation warnings:', warnings);
    }
}

// ========== SCORING ENGINE ==========

function computeWeekScore(weekData) {
    return (weekData.base || 0) + (weekData.speedBonus || 0) + (weekData.bic || 0);
}

function computeCumulativeScore(participant) {
    let total = 0;
    for (const w of Object.values(participant.weeks)) {
        total += computeWeekScore(w);
    }
    return total;
}

function computeWeeksCompleted(participant, totalWeeks) {
    let completed = 0;
    for (const w of Object.values(participant.weeks)) {
        if ((w.status === 'full' || w.status === 'partial') && !w.late) completed++;
    }
    return completed + '/' + totalWeeks;
}

function getCumulativeStatus(participant) {
    if (participant.ooo) return 'OOO';
    const weekIds = Object.keys(participant.weeks);
    const latestWeek = participant.weeks[weekIds[weekIds.length - 1]];
    if (!latestWeek) return 'Not Started';
    if (latestWeek.late) {
        const statusMap = { full: 'Full (Late)', partial: 'Partial (Late)' };
        return statusMap[latestWeek.status] || latestWeek.status;
    }
    const statusMap = { full: 'Full', partial: 'Partial', joined: 'Joined', none: 'Not Started', ooo: 'OOO' };
    return statusMap[latestWeek.status] || latestWeek.status;
}

function getStatusClass(status) {
    status = status.toLowerCase();
    if (status.includes('full')) return 'status-full';
    if (status.includes('partial')) return 'status-partial';
    if (status.includes('joined')) return 'status-joined';
    return 'status-none';
}

// ========== SORTING ==========

function parseSpeedToMinutes(speedText) {
    if (!speedText || speedText === '-') return Infinity;
    speedText = speedText.trim();
    let m = speedText.match(/^(\d+)\s*min$/);
    if (m) return parseInt(m[1]);
    m = speedText.match(/^(\d+)h\s*(\d+)m$/);
    if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
    return Infinity;
}

function sortParticipantsForWeek(participants, weekId) {
    return [...participants].sort((a, b) => {
        const aOOO = a.ooo || false;
        const bOOO = b.ooo || false;
        if (aOOO && !bOOO) return 1;
        if (!aOOO && bOOO) return -1;
        const aTotal = a.weeks[weekId] ? computeWeekScore(a.weeks[weekId]) : 0;
        const bTotal = b.weeks[weekId] ? computeWeekScore(b.weeks[weekId]) : 0;
        if (bTotal !== aTotal) return bTotal - aTotal;
        const aSpeed = a.weeks[weekId] ? parseSpeedToMinutes(a.weeks[weekId].speedTime) : Infinity;
        const bSpeed = b.weeks[weekId] ? parseSpeedToMinutes(b.weeks[weekId].speedTime) : Infinity;
        return aSpeed - bSpeed;
    });
}

function sortParticipantsAllWeeks(participants) {
    return [...participants].sort((a, b) => {
        const aOOO = a.ooo || false;
        const bOOO = b.ooo || false;
        if (aOOO && !bOOO) return 1;
        if (!aOOO && bOOO) return -1;
        const scoreDiff = computeCumulativeScore(b) - computeCumulativeScore(a);
        if (scoreDiff !== 0) return scoreDiff;
        // Tiebreaker: fastest speed in latest week
        const weekIds = Object.keys(a.weeks);
        const latestWeek = weekIds[weekIds.length - 1];
        const aSpeed = a.weeks[latestWeek] ? parseSpeedToMinutes(a.weeks[latestWeek].speedTime) : Infinity;
        const bSpeed = b.weeks[latestWeek] ? parseSpeedToMinutes(b.weeks[latestWeek].speedTime) : Infinity;
        return aSpeed - bSpeed;
    });
}

// ========== TEAM DATA ==========

function getPersonTeams(name, teams) {
    const result = [];
    for (const [teamName, team] of Object.entries(teams)) {
        if (team.members.includes(name)) result.push(teamName);
    }
    return result;
}

function buildTeamTags(name, teams) {
    const personTeams = getPersonTeams(name, teams);
    if (personTeams.length === 0) return '';
    let html = '<div class="team-tags">';
    for (const teamName of personTeams) {
        const team = teams[teamName];
        html += '<span class="team-tag ' + (team.cssClass || '') + '">' + (team.short || teamName) + '</span>';
    }
    html += '</div>';
    return html;
}

function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase();
}

function buildAvatarHTML(participant, size) {
    if (size === 'podium') {
        if (participant.avatar) {
            return '<div class="podium-avatar"><img src="' + participant.avatar + '" alt="' + (participant.robot || '') + '" class="podium-avatar-img"></div>';
        }
        return '<div class="podium-avatar"><span class="podium-avatar-initials">' + getInitials(participant.name) + '</span></div>';
    }
    if (participant.avatar) {
        return '<div class="avatar"><img src="' + participant.avatar + '" alt="' + (participant.robot || '') + '" class="avatar-img"></div>';
    }
    return '<div class="avatar"><span class="avatar-initials">' + getInitials(participant.name) + '</span></div>';
}

function computeTeamData(data, getScore) {
    const participantMap = {};
    data.participants.forEach(p => { participantMap[p.name] = p; });

    const teamData = [];
    for (const [teamName, team] of Object.entries(data.teams)) {
        let total = 0, count = 0, completed = 0;
        const memberList = [];
        team.members.forEach(memberName => {
            const p = participantMap[memberName];
            if (!p) return;
            const isOOO = p.ooo || false;
            const pts = isOOO ? 0 : getScore(p);
            if (!isOOO) {
                total += pts;
                count++;
                if (pts > 10) completed++;
            }
            memberList.push({ name: memberName, pts, ooo: isOOO, participant: p });
        });
        memberList.sort((a, b) => {
            if (a.ooo && !b.ooo) return 1;
            if (!a.ooo && b.ooo) return -1;
            return b.pts - a.pts;
        });
        const avg = count > 0 ? (total / count).toFixed(1) : '0.0';
        teamData.push({ name: teamName, total, avg: parseFloat(avg), count, completed, members: team.members.length, memberList });
    }
    teamData.sort((a, b) => b.avg - a.avg || b.total - a.total);
    return teamData;
}

// ========== RENDERING ==========

function renderApp(data) {
    const weekIds = Object.keys(data.weekMeta);
    const totalWeeks = weekIds.length;

    // Render tab buttons
    const tabNav = document.getElementById('tab-nav');
    let tabHtml = '<button class="tab-btn" data-view="all">All Weeks</button>';
    weekIds.forEach((weekId, i) => {
        const label = 'Week ' + (i + 1);
        tabHtml += '<button class="tab-btn' + (i === weekIds.length - 1 ? ' active' : '') + '" data-view="' + weekId + '">' + label + '</button>';
    });
    tabNav.innerHTML = tabHtml;

    // Add tab event listeners
    tabNav.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            tabNav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + this.dataset.view).classList.add('active');
        });
    });

    // Render views
    const container = document.getElementById('views-container');
    let viewsHtml = '';

    // All Weeks view
    viewsHtml += renderAllWeeksView(data, totalWeeks);

    // Week views
    weekIds.forEach((weekId, i) => {
        const isDefault = (i === weekIds.length - 1);
        viewsHtml += renderWeekView(data, weekId, i + 1, totalWeeks, isDefault);
    });

    container.innerHTML = viewsHtml;

    // Add team expand event listeners
    document.querySelectorAll('.team-lb-row.expandable').forEach(row => {
        row.addEventListener('click', function() {
            const targetId = this.dataset.target;
            const detail = document.getElementById(targetId);
            if (detail) {
                detail.classList.toggle('open');
                this.classList.toggle('expanded');
            }
        });
    });

    // Add Standings / Exercise toggle listeners
    document.querySelectorAll('.week-view-toggle').forEach(toggle => {
        const toggleId = toggle.dataset.toggleId;
        toggle.querySelectorAll('.week-view-toggle-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                toggle.querySelectorAll('.week-view-toggle-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.week-view-panel[data-toggle-id="' + toggleId + '"]').forEach(p => p.classList.remove('active'));
                document.querySelector('.week-view-panel[data-toggle-id="' + toggleId + '"][data-panel="' + this.dataset.panel + '"]').classList.add('active');
            });
        });
    });

    // Load external content for weeks with contentUrl
    document.querySelectorAll('.week-content-embed').forEach(async embed => {
        const url = embed.dataset.contentUrl;
        try {
            const resp = await fetch(url);
            const html = await resp.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            // Extract styles and body content
            const styles = doc.querySelectorAll('style');
            const body = doc.body;
            // Create a scoped wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'week-external-content';
            styles.forEach(s => wrapper.appendChild(s.cloneNode(true)));
            wrapper.innerHTML += body.innerHTML;
            embed.appendChild(wrapper);
            // Activate expandable screenshot lightbox
            wrapper.querySelectorAll('.slack-screenshot-box img').forEach(img => {
                img.style.cursor = 'pointer';
                img.addEventListener('click', function() {
                    const overlay = document.createElement('div');
                    overlay.className = 'screenshot-overlay';
                    overlay.innerHTML = '<img src="' + this.src + '" alt="' + (this.alt || '') + '">';
                    overlay.addEventListener('click', () => overlay.remove());
                    document.body.appendChild(overlay);
                });
            });
        } catch (e) {
            embed.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:40px;">Failed to load exercise content.</p>';
        }
    });
}

        if (p.ooo) return false;
        return Object.values(p.weeks).some(w => w.status === 'full' && !w.late);
    }).length;
    const totalCount = data.participants.filter(p => !p.ooo).length;
    const maxPts = Math.max(...data.participants.filter(p => !p.ooo).map(p => computeCumulativeScore(p)), 0);

    let html = '<div id="view-all" class="view view-all">';

    // Info bar
    html += '<div class="allweeks-info">';

    html += '</div>';
    return html;
}

function renderPodiumsSection(data, sorted, viewId, getScore) {
    const top3 = sorted.filter(p => !p.ooo).slice(0, 3);
    const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
    const heights = [170, 140, 120];
    const displayOrder = [1, 0, 2]; // 2nd, 1st, 3rd

    // Individual podium
    let indivHtml = '<div class="leaderboard"><div class="podium-section-title">Top Individuals</div><div class="podium">';
    displayOrder.forEach(idx => {
        if (!top3[idx]) return;
        const p = top3[idx];
        const pts = getScore(p);
        indivHtml += '<div class="podium-card place-' + (idx + 1) + '">';
        indivHtml += '<div class="podium-medal">' + medals[idx] + '</div>';
        indivHtml += buildAvatarHTML(p, 'podium');
        indivHtml += '<div class="podium-name">' + p.name + '</div>';
        indivHtml += buildTeamTags(p.name, data.teams).replace('class="team-tags"', 'class="team-tags" style="justify-content:center"');
        if (p.robot) indivHtml += '<div class="podium-robot">' + p.robot + '</div>';
        indivHtml += '<div class="podium-points">' + pts + ' pts</div>';
        indivHtml += '<div class="podium-pedestal" style="height:' + heights[idx] + 'px">#' + (idx + 1) + '</div>';
        indivHtml += '</div>';
    });
    indivHtml += '</div></div>';

    // Team podium
    const teamData = computeTeamData(data, getScore);
    const top3Teams = teamData.slice(0, 3);
    let teamHtml = '<div class="leaderboard"><div class="podium-section-title">Top Teams</div><div class="podium">';
    displayOrder.forEach(idx => {
        if (!top3Teams[idx]) return;
        const t = top3Teams[idx];
        const color = data.teams[t.name]?.color || '#6b7280';
        const initials = t.name.split(/[\s&]+/).map(w => w[0]).filter(Boolean).join('').substring(0, 2).toUpperCase();
        teamHtml += '<div class="podium-card place-' + (idx + 1) + '">';
        teamHtml += '<div class="podium-medal">' + medals[idx] + '</div>';
        teamHtml += '<div class="team-podium-avatar" style="background:' + color + '">' + initials + '</div>';
        teamHtml += '<div class="podium-team-name">' + t.name + '</div>';
        teamHtml += '<div class="podium-team-detail">' + t.members + ' members</div>';
        teamHtml += '<div class="podium-points">' + t.avg + ' avg pts</div>';
        teamHtml += '<div class="podium-pedestal" style="height:' + heights[idx] + 'px">#' + (idx + 1) + '</div>';
        teamHtml += '</div>';
    });
    teamHtml += '</div></div>';

    return '<div class="podiums-section">' + indivHtml + teamHtml + '</div>';
}

        const isOOO = p.ooo || false;
        const total = computeCumulativeScore(p);
        const status = getCumulativeStatus(p);

        html += '<div class="weeks-cell">' + weeksStr + '</div>';

    });
    html += '</div></div>';

    // Team panel
    html += renderTeamPanel(data, viewId, p => computeCumulativeScore(p));

    // Add sub-tab switching
    setTimeout(() => {

        const bicColor = w.bic > 0 ? 'orange' : 'muted';

        html += '<div class="lb-row">';

        html += '<div class="total-cell"' + (isOOO ? ' data-ooo' : '') + '><span class="score-pts">' + (isOOO ? '-' : total) + '</span></div>';
        html += '<div></div>';
        html += '</div>';
    });
    html += '</div></div>';

    // Team panel
    html += renderTeamPanel(data, weekId, p => p.weeks[weekId] ? computeWeekScore(p.weeks[weekId]) : 0);

    // Add sub-tab switching
    setTimeout(() => {
        document.querySelectorAll('.sub-tab-btn[data-view-id="' + weekId + '"]').forEach(btn => {
            btn.addEventListener('click', function() {
                const parent = this.closest('.rankings-section');
                parent.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
                parent.querySelectorAll('.rankings-panel').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                parent.querySelector('.rankings-panel[data-panel="' + this.dataset.panel + '"]').classList.add('active');
            });
        });
    }, 0);

    return html;
}

function renderTeamPanel(data, viewId, getScore) {
    const teamData = computeTeamData(data, getScore);

    let html = '<div class="rankings-panel" data-panel="team"><div class="leaderboard">';
    html += '<div class="team-lb-header"><div>#</div><div>Team</div><div>Avg</div><div>Completed</div><div>Members</div></div>';

        const color = data.teams[t.name]?.color || '#6b7280';

        html += '<div class="team-lb-count">' + t.completed + '/' + t.members + '</div>';
        html += '<div class="team-lb-count">' + t.members + '</div>';
        html += '</div>';

        // Member detail rows
        html += '<div class="team-members-detail" id="' + rowId + '">';
        let memberRank = 1;
        t.memberList.forEach(m => {
            const p = m.participant;
            const w = p.weeks[Object.keys(p.weeks)[0]];
            let desc = p.robot || '-';
            if (!m.ooo && w) {
                if (w.base > 0) desc += ' (' + w.base + ' pts)';
                if (w.speedTime && w.speedBonus > 0) desc += ' \u00B7 ' + w.speedTime + ' (+' + w.speedBonus + ')';
            }
            html += '<div class="team-member-row">';
            html += '<div class="team-member-rank">' + (m.ooo ? '-' : memberRank++) + '</div>';
            html += '<div><div class="team-member-name">' + m.name + '</div><div class="team-member-desc">' + desc + '</div></div>';
            html += '<div class="team-member-pts">' + (m.ooo ? '-' : m.pts) + '</div>';
            html += '</div>';
        });
        html += '</div>';
    });

    html += '</div></div>';
    return html;
}
